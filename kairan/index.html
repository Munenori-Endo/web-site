<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回覧板 - 富士見台自治会</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <header style="background-color: #1a4a1a;">
        <h1><a href="../index.html" style="color:white; text-decoration:none;">富士見台自治会</a></h1>
    </header>
    <div class="container">
        <h2>回覧板・資料一覧（架空）</h2>
        <div class="main-grid">
            <a href="#" id="latest-pdf-link" class="main-item">
                <i class="fas fa-file-pdf"></i>
                <span id="pdf-title">最新の資料を読み込み中...</span>
            </a>
        </div>
    </div>

    <script>
        // 新しいPDFファイル名に書き換えました
        const pdfFiles = [
            "ホーム／日進市.pdf"
        ];

        function updateLink() {
            if (pdfFiles.length === 0) return;

            // リストの中で最も新しいものを探す処理（重複があっても最新を表示）
            const latest = pdfFiles.reduce((a, b) => {
                const numA = parseInt(a.replace(/[^0-9]/g, '')) || 0;
                const numB = parseInt(b.replace(/[^0-9]/g, '')) || 0;
                return numA > numB ? a : b;
            });

            const pdfPath = "docs/" + latest;
            const link = document.getElementById('latest-pdf-link');
            const title = document.getElementById('pdf-title');

            if (link) {
                link.href = pdfPath;
                title.textContent = "最新の資料 (" + latest + ")";

                // ページを開いた瞬間に自動でPDFを表示します
                window.location.href = pdfPath;
            }
        }

        window.onload = updateLink;
    </script>
</body>

</html>
