<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岩崎台自治会 ポータル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <header>
        <h1 style="margin:0; font-size:1.4rem;">岩崎台自治会</h1>
    </header>

    <div class="container">

        <section class="office-info"
            style="margin-bottom: 30px; padding: 15px; background: #fff; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <h2 style="border-left: 5px solid #2d5e2d; padding-left: 10px; margin: 0 0 15px 0; font-size: 1.1rem;">
                岩崎台区自治会事務局</h2>
            <div class="office-container"
                style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: start;">
                <div style="flex: 1; min-width: 200px; max-width: 300px;">
                    <img src="community外観.jpeg" alt="コミュニティー岩崎台 外観"
                        style="width: 100%; border-radius: 5px; border: 1px solid #ddd;">
                </div>

                <div style="flex: 1.5; min-width: 280px;">
                    <table
                        style="width: 100%; border-collapse: collapse; border: 1px solid #8fc31f; font-size: 0.9rem;">
                        <tr>
                            <th
                                style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 6px; text-align: left; width: 30%;">
                                建物名称</th>
                            <td style="border: 1px solid #8fc31f; padding: 6px;">コミュニティー岩崎台 [cite: 6]</td>
                        </tr>
                        <tr>
                            <th style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 6px; text-align: left;">
                                住所</th>
                            <td style="border: 1px solid #8fc31f; padding: 6px;">〒470-0135 日進市岩崎台2丁目1503 [cite: 6]</td>
                        </tr>
                        <tr>
                            <th style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 6px; text-align: left;">
                                Tel/Fax</th>
                            <td style="border: 1px solid #8fc31f; padding: 6px;">0561-72-8633 [cite: 6]</td>
                        </tr>
                        <tr>
                            <th style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 6px; text-align: left;">
                                開館時間</th>
                            <td style="border: 1px solid #8fc31f; padding: 6px;">平日 10:00〜12:00 / 13:00〜15:00</td>
                        </tr>
                    </table>
                </div>

                <div style="flex: 1; min-width: 200px; max-width: 300px;">
                    <img src="map-iwasakidai.gif" alt="事務局地図"
                        style="width: 100%; border-radius: 5px; border: 1px solid #ddd;">
                </div>
            </div>
        </section>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">

        <h2 style="font-size: 1.1rem; border-left: 5px solid #2d5e2d; padding-left: 10px; margin-bottom: 15px;">メインメニュー
        </h2>
        <div class="main-grid">
            <a href="kairan/index.html" class="main-item">
                <i class="fas fa-file-alt"></i>
                <span>始めに</span>
                <small style="color:red; display:block; font-size:0.7rem;">4月19日更新</small>
            </a>

            <div class="main-item">
                <i class="fas fa-bullhorn"></i>
                <span>新着情報</span>
            </div>

            <div class="main-item">
                <i class="fas fa-shield-alt"></i>
                <span>防災だより</span>
            </div>

            <div class="main-item">
                <i class="fas fa-calendar-alt"></i>
                <span>行事予定</span>
            </div>

            <div class="main-item">
                <i class="fas fa-gavel"></i>
                <span>自治会規約</span>
            </div>

            <div class="main-item">
                <i class="fas fa-envelope"></i>
                <span>お問い合わせ</span>
            </div>
        </div>

    </div>

    <footer style="margin-top:50px; text-align:center; padding:20px; color:#888; font-size:0.8rem;">
        <p>&copy; 2026 岩崎台自治会</p>
    </footer>

</body>

</html>
