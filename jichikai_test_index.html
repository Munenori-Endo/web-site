<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富士見台自治会 ポータル</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="background-color: #f0f4f8;">

    <header style="background-color: #1a4a1a; color: white; padding: 20px; text-align: center;">
        <h1 style="margin:0; font-size:1.6rem; letter-spacing: 2px;"><i class="fas fa-mountain"
                style="margin-right: 10px;"></i>富士見台自治会</h1>
    </header>

    <div class="container" style="max-width: 900px; margin: 0 auto; padding: 20px;">

        <section class="office-info"
            style="margin-bottom: 40px; padding: 25px; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e0e0;">
            <h2
                style="border-left: 6px solid #1a4a1a; padding-left: 15px; margin: 0 0 20px 0; font-size: 1.3rem; color: #1a4a1a;">
                <i class="fas fa-info-circle" style="margin-right: 8px;"></i>自治会事務局のご案内（架空）
            </h2>
            <div class="office-container"
                style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: start;">
                <div style="flex: 1; min-width: 250px; max-width: 350px;">
                    <img src="https://images.unsplash.com/photo-1570112151121-6a2c3a5e5a7b?q=80&w=600"
                        alt="富士山の見える事務局外観（架空）"
                        style="width: 100%; border-radius: 10px; border: 2px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 5px;">※画像はイメージです</p>
                </div>

                <div style="flex: 1.5; min-width: 300px;">
                    <table
                        style="width: 100%; border-collapse: collapse; border: 1px solid #8fc31f; font-size: 0.95rem; background-color: #fafafa;">
                        <tr>
                            <th
                                style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 12px; text-align: left; width: 35%; color: #1a4a1a;">
                                建物名称</th>
                            <td style="border: 1px solid #8fc31f; padding: 12px;">富士見台コミュニティセンター（架空）</td>
                        </tr>
                        <tr>
                            <th
                                style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 12px; text-align: left; color: #1a4a1a;">
                                住所</th>
                            <td style="border: 1px solid #8fc31f; padding: 12px;">〒000-0000<br>架空市富士見区1丁目2-3</td>
                        </tr>
                        <tr>
                            <th
                                style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 12px; text-align: left; color: #1a4a1a;">
                                電話番号（架空）</th>
                            <td style="border: 1px solid #8fc31f; padding: 12px;">000-1234-5678</td>
                        </tr>
                        <tr>
                            <th
                                style="background: #f0f9e8; border: 1px solid #8fc31f; padding: 12px; text-align: left; color: #1a4a1a;">
                                開館時間（架空）</th>
                            <td style="border: 1px solid #8fc31f; padding: 12px;">平日 9:00〜17:00<br>（土日祝・年末年始休み）</td>
                        </tr>
                    </table>
                </div>

                <div style="flex: 1; min-width: 250px; max-width: 350px;">
                    <img src="https://images.unsplash.com/photo-1520699049698-acd2fccb8cc8?q=80&w=600"
                        alt="富士山周辺の地図（架空）"
                        style="width: 100%; border-radius: 10px; border: 2px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <p style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 5px;">※地図はイメージです</p>
                </div>
            </div>
        </section>

        <hr style="border: 0; border-top: 2px dashed #ccc; margin: 40px 0;">

        <h2
            style="font-size: 1.4rem; border-left: 6px solid #1a4a1a; padding-left: 15px; margin-bottom: 25px; color: #1a4a1a;">
            <i class="fas fa-th-large" style="margin-right: 8px;"></i>メインメニュー
        </h2>
        <div class="main-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px;">

            <a href="kairan/index.html" class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-file-alt" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">始めに（回覧板）</span>
                <small style="color:#d9534f; display:block; font-size:0.8rem; margin-top: 5px;">4月19日更新（架空）</small>
            </a>

            <div class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-bullhorn" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">新着情報</span>
            </div>

            <div class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-shield-alt" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">防災だより</span>
            </div>

            <div class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-calendar-alt" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">行事予定</span>
            </div>

            <div class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-gavel" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">自治会規約</span>
            </div>

            <div class="main-item"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; background: white; border-radius: 12px; padding: 30px; text-decoration: none; color: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e0e0e0; transition: all 0.3s ease;">
                <i class="fas fa-envelope" style="font-size: 2.5rem; color: #1a4a1a; margin-bottom: 15px;"></i>
                <span style="font-weight: bold; font-size: 1.1rem; letter-spacing: 1px;">お問い合わせ</span>
            </div>
        </div>

    </div>

    <footer
        style="margin-top:60px; text-align:center; padding:30px; background-color: #e0e0e0; color:#555; font-size:0.9rem; border-top: 1px solid #ccc;">
        <p>&copy; 2026 富士見台自治会（架空）</p>
        <p style="font-size: 0.8rem; margin-top: 5px;">本サイトの情報はすべて架空のものであり、実在の団体とは関係ありません。</p>
    </footer>

</body>

</html>
